include ':app'

def localPropertiesFile = new File(rootDir, 'local.properties')
def properties = new Properties()

if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> properties.load(reader) }
}

def flutterSdkPath = properties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv('FLUTTER_SDK')
}
if (flutterSdkPath == null) {
    throw new GradleException(
        'Flutter SDK not found. Define location with flutter.sdk in the local.properties file or use FLUTTER_SDK environment variable.'
    )
}

include ':flutter'
project(':flutter').projectDir = new File(flutterSdkPath, '.android')
